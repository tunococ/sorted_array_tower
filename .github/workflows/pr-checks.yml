name: PR Checks

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and cache Docker image
        uses: docker/build-push-action@v7
        with:
          context: ci/
          file: ci/Dockerfile.alpine
          target: gcc
          load: true
          tags: tyghbn:${{ github.head_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests and generate reports
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            --workdir /workspace \
            --entrypoint /bin/sh \
            tyghbn:${{ github.head_ref }} \
            -c "just make-reports"

      - name: Move reports to workspace root for simpler artifact paths
        run: |
          sudo mkdir -p reports/coverage
          sudo mv build/Debug/test-report.xml reports
          sudo mv build/Debug/test-report.txt reports
          sudo mv build/Debug/coverage_report/cobertura.xml reports/coverage
          sudo mv build/Debug/coverage_report/summary.md reports/coverage
          sudo mv build/Debug/coverage_report/summary.txt reports/coverage

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports
          path: reports
          retention-days: 7

  report-summaries:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      checks: write
    if: '!cancelled()'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: reports
      
      - name: Summarize test results
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: test-report.xml
          check_name: summarize-test-results

      - name: Summarize coverage report
        run: |
          export REPORT_MD=$(cat coverage/summary.md)
          export REPORT_TXT=$(cat coverage/summary.txt)
          export SUMMARY=$(grep . coverage/summary.txt | tail -n 1)

          cat coverage/summary.md > $GITHUB_STEP_SUMMARY
          gh api repos/${{ github.repository }}/check-runs \
            -f name="summarize-coverage-report" \
            -f head_sha="${{ github.event.pull_request.head.sha || github.sha }}" \
            -f status="completed" \
            -f conclusion="success" \
            -f output[title]="$SUMMARY" \
            -f output[summary]="$REPORT_TXT" \
            -f output[text]="$REPORT_MD"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Test Summary
      #   uses: test-summary/action@v2
      #   with:
      #     paths: test-report.xml
